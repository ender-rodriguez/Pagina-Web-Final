<!-- servicios.html -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#f2f2f2;}
.card{
border:none;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
#adminPanel{display:none;}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand">Refricentro</a>
<div>
<a class="btn btn-light btn-sm" href="index.html">Inicio</a>
<a class="btn btn-light btn-sm" href="servicios.html">Servicios</a>
<a class="btn btn-light btn-sm" href="ubicacion.html">Ubicación</a>
<a class="btn btn-light btn-sm" href="contacto.html">Contacto</a>
</div>
</div>
</nav>

<div class="container mt-5">

<h1 class="text-center mb-4">Productos</h1>

<div id="productos" class="row"></div>

<hr>

<div id="adminPanel" class="mt-4">
<h3>Panel Admin</h3>

<input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre producto">
<input type="number" id="precio" class="form-control mb-2" placeholder="Precio">
<input type="number" id="stock" class="form-control mb-2" placeholder="Cantidad">
<input type="text" id="imagen" class="form-control mb-2" placeholder="URL Imagen">

<button class="btn btn-success w-100" onclick="agregar()">Agregar Producto</button>
</div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://rqecqrzficiuiwhvuovy.supabase.co",
"sb_publishable_fZmUpFn80rXtriIh07Vuiw_TUXZ5Xlr"
);

let userEmail = localStorage.getItem("userEmail");

async function revisarAdmin(){
const { data } = await supabase
.from("perfiles")
.select("*")
.eq("email", userEmail);

if(data.length > 0 && data[0].rol == "admin"){
document.getElementById("adminPanel").style.display="block";
}
}

async function cargar(){
const { data } = await supabase
.from("productos")
.select("*");

let html = "";

data.forEach(p => {
html += `
<div class="col-md-4 mb-4">
<div class="card p-3">
<h4>${p.nombre}</h4>
<p>RD$${p.precio}</p>
<p>Stock: ${p.stock}</p>
<button class="btn btn-success" onclick="comprar('${p.nombre}')">Comprar</button>
</div>
</div>
`;
});

document.getElementById("productos").innerHTML = html;
}

function comprar(producto){
window.open("https://wa.me/8297163376?text=Hola,%20quiero%20comprar:%20"+producto);
}

async function agregar(){
let nombre = document.getElementById("nombre").value;
let precio = document.getElementById("precio").value;
let stock = document.getElementById("stock").value;
let imagen = document.getElementById("imagen").value;

await supabase.from("productos").insert([
{nombre:nombre, precio:precio, stock:stock, imagen:imagen}
]);

location.reload();
}

cargar();
revisarAdmin();
</script>

</body>
</html>
